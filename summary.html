<!DOCTYPE html>

<html lang="de">
<head>

<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Join</title>

<link rel="stylesheet" href="css/overlay.css"/>
<link rel="stylesheet" href="css/add_task.css"/>
<link rel="stylesheet" href="css/board.css"/>
<link rel="stylesheet" href="css/colors.css"/>
<link rel="stylesheet" href="css/styles.css" />
<link rel="stylesheet" href="css/header.css"/>
<link rel="stylesheet" href="css/footer.css"/>
<link rel="stylesheet" href="css/summary.css"/>
<link rel="stylesheet" href="css/summary_mediaquery.css"/>
<link rel="stylesheet" href="css/keyframe.css"/>
<link href="assets/img/favicon-32x32.png" rel="icon" sizes="32x32" type="image/png"/>
<link href="assets/img/favicon-16x16.png" rel="icon" sizes="16x16" type="image/png"/>
<link href="assets/img/apple-touch-icon.png" rel="apple-touch-icon"/>
<link href="css/styles_mediaquery.css" rel="stylesheet"/>
</head>
<body class="summary-page" onload="init(event)">

  
  <div id="keyframeSummaryOverlay" class="keyframe-summary-overlay" aria-hidden="true">
    <div class="keyframe-summary-overlay__inner">
      <div class="keyframe-summary-overlay__title">Guten Morgen</div>
      <h1 class="keyframe-summary-overlay__name" id="username_keyframe">Username</h1>
    </div>
  </div>
<div class="page">
<div aria-hidden="true" class="left">
<div aria-hidden="true" class="logo-spacer"></div>
<div aria-hidden="false" class="main-links">
<div class="link-row" data-link="summary">
<img alt="Summary icon" class="link-icon" src="assets/img/main_links_left/summary_icon.svg"/>
<span class="nav-label" aria-hidden="true">Summary</span>
</div>
<div class="link-row" data-link="add_task">
<img alt="addTask icon" class="link-icon" src="assets/img/main_links_left/add_task_icon.svg"/>
<span class="nav-label" aria-hidden="true">Add Task</span>
</div>
<div class="link-row" data-link="board">
<img alt="Board icon" class="link-icon" src="assets/img/main_links_left/board_icon.svg"/>
<span class="nav-label" aria-hidden="true">Board</span>
</div>
<div class="link-row" data-link="contacts">
<img alt="contacts icon" class="link-icon" src="assets/img/main_links_left/contacts_icon.svg">
<span class="nav-label" aria-hidden="true">Contacts</span>
</div>
</div>
<div class="legal-area">
<a class="legal-row" href="legal_notice.html" aria-current="false">
    <span class="nav-label" aria-hidden="true">Legal Notice</span>
    
  </a>
  <a class="legal-row" href="privacy_policy.html" aria-current="false">
    <span class="nav-label" aria-hidden="true">Privacy Policy</span>
    
  </a>
</div>
</div>
<main class="content">
<header>
  <div class="header_max">
        <div class="header_div">
        <h4 class="header_extra">Kanban Project Management Tool</h4>
        <img class="join_icon" src="assets/img/login_join.svg">
        </div>
        <div class="header_icons">
            <img class="help_icon" src="assets/img/help.svg" onclick="toHelpPage()">
            <div class="my_icon" onclick="openUserMenu()"></div>
            <nav class="user_menu d_none" id="user_menu">
            <ul>
            <li class="help_res"><a href="help.html"><span>Help</span></a></li>
            <li><a href="legal_notice.html"><span>Legal Notice</span></a></li>
            <li><a href="privacy_policy.html"><span>Privacy Policy</span></a></li>
            <li class="last_item"><a href="" onclick="logoutUser(event)"><span>Log out</span></a></li>
            </ul>
            </nav>
        </div>
        </div>
</header>
<div class="header_overlay d_none" id="header_overlay" onclick="closeUserMenu()"></div>

<div class="summary-scroll">

<div class="summary-headline">
  <h2>Join 360</h2>
  <span class="summary-headline__divider" aria-hidden="true"></span>
  <span class="summary-headline__text">Key Matrics at a Glance</span>
</div>

<div class="summary-grid">
  <button class="summary-btn summary-btn--todo" type="button">
    <div class="summary-btn__content">
      <div class="summary-btn__icon" aria-hidden="true">
        <img class="summary-btn__icon-img" src="assets/img/edit.svg" alt="">
      </div>
      <div class="summary-btn__text">
        <h2 id="to_do">0</h2>
        <h4 class="To-do_text">To-do</h4>
      </div>
    </div>
  </button>

  <button class="summary-btn summary-btn--done" type="button">
    <div class="summary-btn__content">
      <div class="summary-btn__icon" aria-hidden="true">
        <img class="summary-btn__icon-img" src="assets/img/check_black.svg" alt="">
      </div>
      <div class="summary-btn__text">
        <div id="done">0</div>
        <h4 class="done_text">done</h4>
      </div>
    </div>
  </button>

  <div class="summary-urgent-wrap">
  <button class="summary-btn summary-btn--urgent" type="button">
    <div class="summary-btn__content">
      <div class="summary-btn__icon summary-btn__icon--urgent" aria-hidden="true">
        <img class="summary-btn__icon-img--urgent" src="assets/img/Frame 59.svg" alt="">
      </div>
      <div class="summary-btn__text">
        <div id="urgent">0</div>
        <h4 class="text_urgent-specialsize">Urgent</h4>
      </div>

    
      <span class="summary-btn__divider" aria-hidden="true"></span>
      <div class="summary-btn__deadline" aria-label="Nächste Deadline">
        <div class="summary-btn__duedate" id="upcoming_duedate">—</div>
        <div class="summary-btn__deadline-label">Upcoming Deadline</div>
      </div>
    </div>
  </button>
    <div class="summary-greeting" aria-label="Begrüßung">
      <div class="summary-greeting__title">Guten Morgen</div>
      <div class="summary-greeting__name" id="username">Username</div>
    </div>
  </div>

  <button class="summary-btn summary-btn--board" type="button">
    <div class="summary-btn__content">
      
      <div class="summary-btn__text">
        <div id="tasks_in_board">0</div>
        <h4>Tasks in Board</h4>
      </div>
    </div>
  </button>

  <button class="summary-btn summary-btn--progress" type="button">
    <div class="summary-btn__content">
      
      <div class="summary-btn__text">
        <div id="tasks_in_progress">0</div>
        <h4>Tasks In Progress</h4>
      </div>
    </div>
  </button>

  <button class="summary-btn summary-btn--feedback" type="button">
    <div class="summary-btn__content">
      
      <div class="summary-btn__text">
        <div id="awaiting_feedback">0</div>
        <h4>Awaiting Feedback</h4>
      </div>
    </div>
  </button>
</div>

</div>
</main>
</div>


  <script src="js/script.js"></script>
  <script src="js/navigate.js"></script>
  <script src="js/summary.js"></script>
  <script src="js/keyframe.js"></script>
  <script src="js/summary_mediaquery.js"></script>
</body>
</html>
